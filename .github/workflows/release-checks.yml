name: Release checks

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-macos-release:
    name: Validate macOS release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: test -z "$(gofmt -s -l .)"

      - name: Run static checks and tests
        run: |
          go vet ./...
          go test ./...

      - name: Build versioned release binary
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o dist/lrc ./cmd/lrc
          test "$(dist/lrc --version)" = "${VERSION}"

      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: lrc-macos-${{ github.ref_name }}
          path: dist/lrc
          if-no-files-found: error
